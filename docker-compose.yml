version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: soc-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - soc-network

  redis:
    image: redis:7

    container_name: soc-redis

    ports:
      - "6379:6379"

    networks:
      - soc-network

  qdrant:
    image: qdrant/qdrant

    container_name: soc-qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - soc-network

  neo4j:
    image: neo4j:5

    container_name: soc-neo4j

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/password

    volumes:
      - neo4j_data:/data

    networks:
      - soc-network

volumes:

  postgres_data:

  qdrant_data:

  neo4j_data:

networks:

  soc-network: